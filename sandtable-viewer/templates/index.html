<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SandTable — live</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div id="badge" class="badge badge--idle">IDLE</div>
      <div id="meta">
        <div id="filename">Waiting for the table…</div>
        <div id="sub">
          <span id="round"></span>
          <span id="eta"></span>
        </div>
      </div>
      <div id="pct">--%</div>
    </header>

    <canvas id="stage"></canvas>

    <div id="progressbar"><div id="progressbar-fill"></div></div>
  </div>

  <script>
    window.VIEWER_CONFIG = {
      bedX: {{ bed_x }},
      bedY: {{ bed_y }},
      pollMs: {{ (poll_interval * 1000) | int }}
    };
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
